<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · Cupbop Maintenance</title>
    <meta name="theme-color" content="#e11d2a" />
    <style>
      :root { color-scheme: light; }
      html, body { margin: 0; padding: 0; height: 100%; background: #0f0f10; color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif; }
      main { min-height: 100%; display: grid; place-items: center; padding: 24px; }
      .card { max-width: 420px; text-align: center; }
      .logo { width: 56px; height: 56px; border-radius: 12px; background: #e11d2a; color: #fff;
        display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 22px; }
      h1 { margin: 16px 0 8px; font-size: 22px; }
      p { margin: 0; color: rgba(255,255,255,0.7); font-size: 14px; line-height: 1.5; }
      button { margin-top: 20px; background: #e11d2a; color: #fff; border: 0; border-radius: 8px;
        padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="logo">C</div>
        <h1>You're offline</h1>
        <p>Cupbop Maintenance needs a connection to load work orders. Reconnect and try again.</p>
        <button type="button" onclick="location.reload()">Retry</button>
      </div>
    </main>
  </body>
</html>
